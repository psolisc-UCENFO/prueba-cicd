name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: coindash-api
        run: npm install

      - name: Run tests
        working-directory: coindash-api
        run: npm test

      - name: Deploy simulation
        run: echo "🚀 Deploy successful!"
